<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Unit Converter</title>
    <!-- CSS LINK -->
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- MAIN -->
    <div class="main-container">
      <div class="header">
        <h1>Metric/Imperial Unit Converter</h1>
        <input type="number" inputmode="numeric" pattern="0-9" id="input-el" />
        <button class="convert-btn" id="convert-btn">CONVERT</button>
      </div>
      <div class="result">
        <div class="result-card length" id="length-result">
          <h2>Length(Meter/Feet)</h2>
          <p id="length-result-card"></p>
        </div>
        <div class="result-card volume" id="volume-result">
          <h2>Volume(Litres/Gallons)</h2>
          <p id="volume-result-card"></p>
        </div>
        <div class="result-card mass" id="mass-result">
          <h2>Mass(Kilograms/Pounds)</h2>
          <p id="mass-result-card"></p>
        </div>
      </div>
    </div>

    <!-- JAVASCRIPT -->
    <script src="script.js"></script>
  </body>
</html>
